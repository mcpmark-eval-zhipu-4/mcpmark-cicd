name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Job 1: Auto-triage issues based on keywords in title and body
  issue-triage:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    name: Auto-Triage Issue
    steps:
      - name: Extract Issue Title and Body
        id: issue_details
        run: |
          echo "TITLE=$(jq -r '.issue.title' $GITHUB_EVENT_PATH)" >> $GITHUB_OUTPUT
          echo "BODY=$(jq -r '.issue.body // ""' $GITHUB_EVENT_PATH)" >> $GITHUB_OUTPUT
          echo "ISSUE_NUMBER=$(jq -r '.issue.number' $GITHUB_EVENT_PATH)" >> $GITHUB_OUTPUT

      - name: Add Needs-Triage Label
        uses: actions/github-script@v7
        with:
          script: |
            const context = context.repo;
            const issueNumber = ${{ steps.issue_details.outputs.ISSUE_NUMBER }};
            
            try {
              await github.rest.issues.addLabels({
                owner: context.owner,
                repo: context.repo,
                issue_number: issueNumber,
                labels: ['needs-triage']
              });
            } catch (error) {
              console.log('Could not add needs-triage label:', error.message);
            }

      - name: Detect Category Labels
        uses: actions/github-script@v7
        with:
          script: |
            const context = context.repo;
            const issueNumber = ${{ steps.issue_details.outputs.ISSUE_NUMBER }};
            const title = ${{ steps.issue_details.outputs.TITLE }};
            const body = ${{ steps.issue_details.outputs.BODY }};
            const issueContent = (title + ' ' + body).toLowerCase();
            const labels = [];
            
            if (issueContent.includes('bug')) labels.push('bug');
            if (issueContent.includes('epic')) labels.push('epic');
            if (issueContent.includes('maintenance')) labels.push('maintenance');
            
            if (labels.length === 0) labels.push('enhancement');
            
            if (labels.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.owner,
                  repo: context.repo,
                  issue_number: issueNumber,
                  labels: labels
                });
              } catch (error) {}
            }

      - name: Detect Priority and Add Label
        uses: actions/github-script@v7
        with:
          script: |
            const context = context.repo;
            const issueNumber = ${{ steps.issue_details.outputs.ISSUE_NUMBER }};
            const title = ${{ steps.issue_details.outputs.TITLE }};
            const body = ${{ steps.issue_details.outputs.BODY }};
            const issueContent = (title + ' ' + body).toLowerCase();
            const labels = [];
            
            if (issueContent.includes('critical') || issueContent.includes('urgent') || 
                issueContent.includes('production') || issueContent.includes('outage')) {
              labels.push('priority-critical');
            } else if (issueContent.includes('important') || issueContent.includes('high') || 
                       issueContent.includes('blocking')) {
              labels.push('priority-high');
            } else {
              labels.push('priority-medium');
            }
            
            try {
              await github.rest.issues.addLabels({
                owner: context.owner,
                repo: context.repo,
                issue_number: issueNumber,
                labels: labels
              });
            } catch (error) {}

  # Job 2: Create sub-issues for Epic issues
  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.title, 'Epic') && github.event.action == 'opened'
    name: Task Breakdown
    steps:
      - name: Extract Original Title
        id: extract_title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ORIGINAL_TITLE=$(echo "$ISSUE_TITLE" | sed 's/^Epic: //I')
          if [ ${#ORIGINAL_TITLE} -gt 60 ]; then
            ORIGINAL_TITLE="${ORIGINAL_TITLE:0:57}..."
          fi
          echo "ORIGINAL_TITLE=$ORIGINAL_TITLE" >> $GITHUB_OUTPUT
          echo "PARENT_ISSUE=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Create Sub-Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PARENT="${{ steps.extract_title.outputs.PARENT_ISSUE }}"
          TITLE="${{ steps.extract_title.outputs.ORIGINAL_TITLE }}"
          REPO="${{ github.repository }}"
          
          TASKS=(
            "Requirements Analysis"
            "Design and Architecture"
            "Implementation"
            "Testing and Documentation"
          )
          
          echo "Creating 4 sub-issues for epic #$PARENT"
          
          for i in 0 1 2 3; do
            TASK="${TASKS[$i]}"
            SUB_TITLE="[SUBTASK] $TITLE - Task $((i+1)): $TASK"
            TASK_NUM=$((i+1))
            
            cat << EOF | gh issue create --repo "$REPO" --title "$SUB_TITLE" --body "$(cat)" --label "enhancement,needs-review"
## Subtask: Task $TASK_NUM - $TASK

This subtask is part of Epic #$PARENT

### Task Checklist
- [ ] Complete task $TASK_NUM
- [ ] Review and approve
- [ ] Close when complete

---

**Related to** #[${PARENT}]
*Created automatically by issue automation workflow*
EOF
            echo "✓ Created sub-issue for Task $TASK_NUM"
          done

      - name: Update Parent Issue Checklist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PARENT="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          
          gh issue edit "$PARENT" --repo "$REPO" --body "$(cat << EOF

## Epic Tasks

### Task Breakdown

| Task | Status | Issue |
|------|--------|-------|
| Requirements Analysis | ( ) Pending | ([link]) |
| Design and Architecture | ( ) Pending | ([link]) |
| Implementation | ( ) Pending | ([link]) |
| Testing and Documentation | ( ) Pending | ([link]) |

*Created automatically by issue automation workflow*
EOF
)"
          echo "✓ Updated parent with task checklist"

  # Job 3: Auto-response for first-time contributors and info
  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    if: github.event.action == 'opened'
    name: Auto-Response
    steps:
      - name: Check First-Time Contributor
        id: check_first
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          AUTHOR="${{ github.event.issue.user.login }}"
          COUNT=$(gh issue list --repo "$REPO" --author "$AUTHOR" --state all --json number --limit 100 | jq 'length' 2>/dev/null || echo '0')
          
          if [ "$COUNT" -le 1 ]; then
            echo "FIRST_TIME=true" >> $GITHUB_OUTPUT
          else
            echo "FIRST_TIME=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect Issue Type
        id: detect_type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ github.event.issue.title }}"
          BODY="${{ github.event.issue.body }}"
          CONTENT=$(echo "${TITLE} ${BODY}" | tr '[:upper:]' '[:lower:]')
          
          if echo "$CONTENT" | grep -qi '\\bbug\\b'; then
            echo "TYPE=bug" >> $GITHUB_OUTPUT
            echo "IS_BUG=true" >> $GITHUB_OUTPUT
          elif echo "$CONTENT" | grep -qi '^epic:?\\s'; then
            echo "TYPE=epic" >> $GITHUB_OUTPUT
            echo "IS_EPIC=true" >> $GITHUB_OUTPUT
          elif echo "$CONTENT" | grep -qi 'maintenance'; then
            echo "TYPE=maintenance" >> $GITHUB_OUTPUT
            echo "IS_MAINT=true" >> $GITHUB_OUTPUT
          else
            echo "TYPE=general" >> $GITHUB_OUTPUT
          fi

      - name: Post First-Time Welcome
        if: steps.check_first.outputs.FIRST_TIME == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.name,
              issue_number: ${{ github.event.issue.number }},
              body: \`👋 Welcome, \${github.event.issue.user.login}!

## 🎉 First Time Contributing?

Thanks for your first issue!

### Get Started
- 📖 Documentation
- 📝 Contributing Guidelines

### Your Issue
- **Type**: ${{ steps.detect_type.outputs.TYPE }}
- **Priority**: Auto-assigned
- **Status**: Being triaged

We appreciate your help!\`
            });

      - name: Post Type-Specific Response
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ github.event.issue.number }};
            const issueType = ${{ steps.detect_type.outputs.TYPE }};
            const isBug = ${{ steps.detect_type.outputs.IS_BUG }};
            const isEpic = ${{ steps.detect_type.outputs.IS_EPIC }};
            const isFirstTime = ${{ steps.check_first.outputs.FIRST_TIME }};
            
            let message = '';
            
            if (isBug) {
              message = \`🐛 **Bug Report Guidelines**

We're reviewing your bug report.

## Next Steps
1. Review will happen in 24-48 hours
2. We'll create a fix and update here
3. Questions welcome - please comment if needed

## Tips
- ✅ Clear title
- ✅ Steps to reproduce  
- ✅ Expected vs actual behavior
- ✅ Environment details
- ✅ Error messages

Thanks for your patience! 🙌\`;
            } else if (isEpic) {
              message = \`✨ **Feature Request Process**

Great Epic! Here's what happens:

## Workflow
1. **Triage**: We'll review the full scope
2. **Task Breakdown**: Auto-created sub-issues
3. **Prioritization**: High priority + milestone tracked
4. **Planning**: Sprint/iteration breakdown

## Tracking
- Status: \`needs-triage\` → \`needs-review\`
- Subtasks: 4 auto-created
  - Requirements Analysis
  - Design and Architecture  
  - Implementation
  - Testing and Documentation
- Priority: \`priority-high\` or \`priority-critical\`

Exciting! 🚀\`;
            } else {
              message = \`📖 General Guidelines

## Workflow
1. **Auto-Triage**: Labels assigned automatically
2. **Review**: Within 24-48 hours
3. **Status**: \`needs-triage\` → \`needs-review\`

## Current Status
- Type: See labels
- Priority: Auto-assigned
- Time in repo: \${isFirstTime === 'true' ? 'First issue! Welcome!' : 'Contributor'}

Thanks for your issue! 💜\`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.name,
              issue_number: issueNumber,
              body: message
            });

      - name: Set Milestone for Non-Maintenance
        if: steps.detect_type.outputs.TYPE != 'maintenance'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          
          gh issue edit "$ISSUE" --repo "$REPO" --add-label "needs-review"
          gh issue edit "$ISSUE" --repo "$REPO" --add-milestone "v1.0.0"