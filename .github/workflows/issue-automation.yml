name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  issue-triage:
    name: Issue Triage
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'labeled'
    outputs:
      category_labels: ${{ steps.category.outputs.labels }}
      priority_label: ${{ steps.priority.outputs.priority }}
    steps:
      - name: Auto-assign category labels
        id: category
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueContext = context.issue;
            const title = context.payload.issue.title.toLowerCase();
            let categoryLabels = [];
            
            // Check for category keywords in TITLE only (case-insensitive per requirement)
            if (title.includes('bug')) {
              categoryLabels.push('bug');
            }
            if (title.includes('epic')) {
              categoryLabels.push('epic');
            }
            if (title.includes('maintenance')) {
              categoryLabels.push('maintenance');
            }
            
            // Default: enhancement if no category found
            if (categoryLabels.length === 0) {
              categoryLabels.push('enhancement');
            }
            
            // Always add needs-triage label for new issues
            categoryLabels.push('needs-triage');
            
            // Assign labels
            if (categoryLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueContext.number,
                labels: categoryLabels
              });
              console.log('Added category labels:', categoryLabels.join(', '));
            }
            
            core.setOutput('labels', categoryLabels.join(','));
            
      - name: Determine priority label
        id: priority
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueContext = context.issue;
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            let priorityLabel = 'priority-medium';
            
            // Priority keywords (highest priority wins) - check both title and body
            const priorityKeywords = [
              { label: 'priority-critical', keywords: ['critical', 'urgent', 'production', 'outage'] },
              { label: 'priority-high', keywords: ['important', 'high', 'blocking'] },
              { label: 'priority-medium', keywords: ['medium', 'normal'] },
              { label: 'priority-low', keywords: ['low', 'nice-to-have', 'minor'] }
            ];
            
            // Check title first, then body for priority
            for (const priority of priorityKeywords) {
              if (priority.label === 'priority-high') {
                for (const keyword of priority.keywords) {
                  if (title.includes(keyword) || body.includes(keyword)) {
                    priorityLabel = priority.label;
                    console.log('Detected priority:', priorityLabel);
                    break;
                  }
                }
                if (priorityLabel === 'priority-high') break;
              }
            }
            
            // Get current labels
            const currentIssue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueContext.number
            });
            
            const priorityLabels = ['priority-critical', 'priority-high', 'priority-medium', 'priority-low'];
            const currentLabels = currentIssue.data.labels.map(l => l.name);
            const targetLabels = currentLabels.filter(l => !priorityLabels.includes(l));
            
            if (!targetLabels.includes(priorityLabel)) {
              targetLabels.push(priorityLabel);
              await github.rest.issues.setLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueContext.number,
                labels: targetLabels
              });
              console.log('Updated priority label to:', priorityLabel);
            }
            
            core.setOutput('priority', priorityLabel)

  task-breakdown:
    name: Task Breakdown
    runs-on: ubuntu-latest
    needs: issue-triage
    if: startsWith(github.event.issue.title, 'Epic')
    steps:
      - name: Create sub-issues
        id: create_subissues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.issue;
            const epicTitle = context.payload.issue.title;
            const body = context.payload.issue.body || '';
            const parentNumber = issue.number;
            const subIssues = [];
            
            const tasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];
            
            // Create sub-issues with proper title pattern
            for (let i = 0; i < tasks.length; i++) {
              const subIssueTitle = `[SUBTASK] ${epicTitle} - Task ${i + 1}: ${tasks[i].name}`;
              const subIssueBody = `Task from Epic: [${epicTitle}](#${parentNumber})\n\n### Related to #${parentNumber}\n\n> This is a sub-task created automatically from the parent epic issue.\n\n#### Task ${i + 1}: ${tasks[i].name}\n\n- [ ] Requirements Documented\n- [ ] Design Approved\n- [ ] Code Complete\n- [ ] Tests Passing\n- [ ] Documentation Updated`;
              
              try {
                const response = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: subIssueTitle,
                  body: subIssueBody,
                  labels: ['enhancement', 'needs-review']
                });
                subIssues.push(response.data.number);
                console.log('Created sub-issue #' + response.data.number + ': ' + subIssueTitle);
              } catch (error) {
                console.error('Failed to create sub-issue ' + (i + 1) + ': ' + error.message);
              }
            }
            
            // Update parent issue body with checklist
            const taskChecklist = subIssues.map(function(num, index) {
              return '- [ ] ' + tasks[index].name + ' ([#' + num + '](#' + num + '))';
            }).join('\n');
            
            const updatedBody = body + '\n\n## Epic Tasks\n\n' + taskChecklist + '\n\n### Sub-issues\n\n- Task 1 (Requirements Analysis): #' + subIssues[0] + '\n- Task 2 (Design and Architecture): #' + subIssues[1] + '\n- Task 3 (Implementation): #' + subIssues[2] + '\n- Task 4 (Testing and Documentation): #' + subIssues[3] + '\n\n---\n_Epic auto-created ' + new Date().toISOString() + '_';
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: updatedBody
            });
            
            console.log('Updated parent issue #' + parentNumber + ' with checklist');
            core.setOutput('sub_issues', subIssues.join(','));
            core.setOutput('sub_issue_count', subIssues.length.toString());

  auto-response:
    name: Auto Response
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    if: github.event.action == 'opened'
    steps:
      - name: Check if first-time contributor
        id: first_contributor
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const author = context.payload.issue.user.login;
            
            try {
              const result = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                state: 'all',
                creator: author,
                per_page: 1
              });
              
              if (result.data.length === 0) {
                core.setOutput('is_first_time', 'true');
                console.log('First-time contributor detected');
              } else {
                core.setOutput('is_first_time', 'false');
                console.log('Not a first-time contributor');
              }
            } catch (error) {
              console.error('Error checking first-time contributor:', error.message);
              core.setOutput('is_first_time', 'false');
            }

      - name: Add first-time contributor label and welcome message
        if: steps.first_contributor.outputs.is_first_time == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.issue;
            const author = context.payload.issue.user.login;
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['first-time-contributor']
            });
            
            const welcomeMessage = '⭐ Welcome to the project, ' + author + '!\n\nThanks for your first issue contribution! We are excited to have you here.\n\n## Getting Started\n\n### Bug Report Guidelines\nIf you are reporting a bug, please ensure you have included:\n- Clear description of the issue\n- Steps to reproduce\n- Expected vs actual behavior\n- Relevant log output or screenshots\n\nSee our [Contributing Guide](CONTRIBUTING.md) for more details.\n\n### Feature Request Process\nFor feature requests, please provide:\n- Clear description of the feature\n- Use case and motivation\n- Proposed solution approach (optional)\n\n### Maintenance Guidelines\nFor maintenance tasks:\n- Describe the current state and problem\n- Detail the proposed action\n- Provide any relevant context or impact assessment\n\n## Next Steps\n\nYour issue will be triaged by maintainers shortly. We will review it and get back to you with updates.';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: welcomeMessage
            });
            
            console.log('Added first-time contributor label and welcome message');

      - name: Post type-specific response and set milestone
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.issue;
            const githubContext = context;
            
            // Get current labels
            const issueData = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });
            
            const labels = issueData.data.labels.map(function(l) { return l.name; });
            const isBug = labels.indexOf('bug') !== -1;
            const isEpic = labels.indexOf('epic') !== -1;
            const isMaintenance = labels.indexOf('maintenance') !== -1;
            
            let responseMessage = '';
            
            if (isBug) {
              responseMessage = '🐛 Thanks for reporting this bug!\n\n### Bug Report Guidelines\nPlease check the following before we begin investigating:\n- [ ] You have checked for existing issues\n- [ ] You have provided clear steps to reproduce\n- [ ] You have specified expected behavior\n- [ ] You have provided any relevant logs or error messages\n\nOur maintainers will review this issue and update you with progress. See our [Bug Triage Process](CONTRIBUTING.md#bug-reports) for details.';
            } else if (isEpic) {
              responseMessage = '🎨 Thanks for submitting this feature request!\n\n### Feature Request Process\nThis epic will be broken down into actionable sub-tasks. Our maintainers will:\n1. Add the milestone "v1.0.0" if this is marked as high priority\n2. Create 4 sub-tasks for the epic (Requirements Analysis, Design, Implementation, Testing)\n3. Link first-time contributors for a warm welcome\n\nOur maintainers will review this epic and update you with the sub-task breakdown. See our [Feature Request Process](CONTRIBUTING.md#feature-requests) for details.';
            } else if (isMaintenance) {
              responseMessage = '🔧 Thanks for submitting a maintenance task!\n\n### Maintenance Guidelines\nPlease ensure your request includes:\n- Clear description of the current state\n- Proposed action or fix\n- Impact assessment\n- Any relevant technical context\n\nOur maintainers will review this request and add it to the appropriate sprint if deemed valuable. See our [Maintenance Guidelines](CONTRIBUTING.md#maintenance) for details.';
            } else {
              responseMessage = '📮 Thanks for submitting an issue!\n\nYour issue has been triaged and assigned the following labels:\n- ' + labels.map(function(l) { return '* ' + l; }).join('\n') + '\n\nPlease update the issue with any additional details that might help us investigate.\n\nRemember to check for existing issues before creating new ones. See our [Contributing Guide](CONTRIBUTING.md) for full details.';
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: responseMessage
            });
            
            console.log('Posted type-specific response');
            
            // Set milestone for high-priority issues
            const priorityLabels = ['priority-critical', 'priority-high'];
            const hasPriority = priorityLabels.some(function(label) { return labels.indexOf(label) !== -1; });
            
            if (hasPriority) {
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  milestone: 'v1.0.0'
                });
                console.log('Set milestone to v1.0.0 for high-priority issue');
              } catch (error) {
                console.error('Failed to set milestone:', error.message);
              }
            }
            
            // Update needs-triage to needs-review after response
            try {
              const currentLabels = labels.filter(function(l) { return l !== 'needs-triage'; });
              await github.rest.issues.setLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: currentLabels
              });
              console.log('Updated label from needs-triage to needs-review');
            } catch (error) {
              console.error('Failed to update labels:', error.message);
            }