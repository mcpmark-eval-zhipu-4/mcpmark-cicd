name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  issues: write
  labels: write

jobs:
  issue-triage:
    name: Issue Classification and Triage
    runs-on: ubuntu-latest
    if: github.event.issue.state == 'open'
    outputs:
      category_label: ${{ steps.classify-issue.outputs.category }}
      priority_label: ${{ steps.classify-issue.outputs.priority }}
      has_bug: ${{ steps.classify-issue.outputs.has_bug }}
      has_epic: ${{ steps.classify-issue.outputs.has_epic }}
      has_maintenance: ${{ steps.classify-issue.outputs.has_maintenance }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Classify and Label Issue
        id: classify-issue
        run: |
          echo "Issue Title: ${{ github.event.issue.title }}"
          echo "Issue Body: ${{ github.event.issue.body || '' }}"
          echo "Current Labels: ${{ github.event.issue.labels.map(.name).join(', ') }}"
          
          # Determine category labels
          CATEGORY_LABELS=""
          CATEGORY_KEYWORDS="${{ github.event.issue.title }}"
          if [[ "${CATEGORY_KEYWORDS}" == *bug* ]] || [[ "${CATEGORY_KEYWORDS}" == *Bug* ]] || [[ "${CATEGORY_KEYWORDS}" == *BUG* ]]; then
            CATEGORY_LABELS="bug"
          fi
          if [[ "${CATEGORY_KEYWORDS}" == *epic* ]] || [[ "${CATEGORY_KEYWORDS}" == *Epic* ]] || [[ "${CATEGORY_KEYWORDS}" == *EPIC* ]]; then
            CATEGORY_LABELS="epic"
          fi
          if [[ "${CATEGORY_KEYWORDS}" == *maintenance* ]] || [[ "${CATEGORY_KEYWORDS}" == *Maintenance* ]] || [[ "${CATEGORY_KEYWORDS}" == *MAINTENANCE* ]]; then
            CATEGORY_LABELS="maintenance"
          fi
          
          echo "category=${CATEGORY_LABELS}" >> $GITHUB_OUTPUT
          echo "has_bug=0" >> $GITHUB_OUTPUT
          echo "has_epic=0" >> $GITHUB_OUTPUT
          echo "has_maintenance=0" >> $GITHUB_OUTPUT
          
          if [[ "${CATEGORY_LABELS}" == *"bug"* ]]; then
            echo "has_bug=1" >> $GITHUB_OUTPUT
          fi
          if [[ "${CATEGORY_LABELS}" == *"epic"* ]]; then
            echo "has_epic=1" >> $GITHUB_OUTPUT
          fi
          if [[ "${CATEGORY_LABELS}" == *"maintenance"* ]]; then
            echo "has_maintenance=1" >> $GITHUB_OUTPUT
          fi
          
          # Determine priority labels (check title and body, highest priority wins)
          ISSUE_CONTENT="${{ github.event.issue.title }}${{ github.event.issue.body || '' }}"
          PRIORITY_LABELS=""
          
          if [[ "${ISSUE_CONTENT}" == *[Cc]ritical* ]] || \
             [[ "${ISSUE_CONTENT}" == *[Uu]rgent* ]] || \
             [[ "${ISSUE_CONTENT}" == *[Pp]roduction* ]] || \
             [[ "${ISSUE_CONTENT}" == *[Oo]utage* ]]; then
            PRIORITY_LABELS="priority-critical"
          elif [[ "${ISSUE_CONTENT}" == *[Ii]mportant* ]] || \
               [[ "${ISSUE_CONTENT}" == *[Hh]igh* ]] || \
               [[ "${ISSUE_CONTENT}" == *[Bb]locking* ]]; then
            PRIORITY_LABELS="priority-high"
          elif [[ "${ISSUE_CONTENT}" == *[Mm]edium* ]] || \
               [[ "${ISSUE_CONTENT}" == *[Nn]ormal* ]]; then
            PRIORITY_LABELS="priority-medium"
          else
            # Default to medium if no priority keywords found
            PRIORITY_LABELS="priority-medium"
          fi
          
          echo "priority=${PRIORITY_LABELS}" >> $GITHUB_OUTPUT
          
          echo "=== Classification Results ==="
          echo "Category Labels: ${CATEGORY_LABELS}"
          echo "Priority Label: ${PRIORITY_LABELS}"
          echo "Has Bug: ${has_bug}"
          echo "Has Epic: ${has_epic}"
          echo "Has Maintenance: ${has_maintenance}"

      - name: Add needs-triage label (default)
        if: steps.classify-issue.outputs.category == ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['needs-triage']
            })

      - name: Add Category and Priority Labels
        if: steps.classify-issue.outputs.category != '' || steps.classify-issue.outputs.priority != ''
        uses: actions/github-script@v7
        with:
          script: |
            const requestedLabels = [];
            
            // Add needs-triage if not already present
            if (context.issue.labels.length > 0) {
              const existingLabels = context.issue.labels.map(l => l.name);
              if (!existingLabels.includes('needs-triage')) {
                requestedLabels.push('needs-triage');
              }
            } else {
              requestedLabels.push('needs-triage');
            }
            
            // Add category labels
            if ('${{ steps.classify-issue.outputs.category }}') {
              const category = '${{ steps.classify-issue.outputs.category }}';
              if (!requestedLabels.includes(category) && !context.issue.labels.find(l => l.name === category)) {
                requestedLabels.push(category);
              }
            }
            
            // Add priority labels
            if ('${{ steps.classify-issue.outputs.priority }}') {
              const priority = '${{ steps.classify-issue.outputs.priority }}';
              if (!requestedLabels.includes(priority) && !context.issue.labels.find(l => l.name === priority)) {
                requestedLabels.push(priority);
              }
            }
            
            console.log('Adding labels:', requestedLabels);
            
            if (requestedLabels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: requestedLabels
              });
            }

  task-breakdown:
    name: Break Down Epic Issues
    runs-on: ubuntu-latest
    needs: issue-triage
    if: needs.issue-triage.outputs.has_epic == '1' && github.event.issue.state == 'open'
    outputs:
      sub_issues: ${{ steps.create-sub-issues.outputs.sub_issues }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract Epic Name and Create Sub-Issues
        id: create-sub-issues
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          # Extract Epic name from title (remove "Epic:" prefix)
          EPIC_NAME="${ISSUE_TITLE#Epic: }"
          if [[ "$EPIC_NAME" == "$ISSUE_TITLE" ]]; then
            EPIC_NAME="${ISSUE_TITLE#"Epic: "}"
          fi
          EPIC_NAME="${EPIC_NAME#"epic: "}"
          EPIC_NAME="${EPIC_NAME#"Epic "}"
          
          echo "Epic Name: $EPIC_NAME"
          
          # Define task names
          TASKS=(
            "Requirements Analysis"
            "Design and Architecture"
            "Implementation"
            "Testing and Documentation"
          )
          
          SUB_ISSUE_COUNTER=1
          SUB_ISSUES=""
          FIRST_SUB_ISSUE_NUM=""
          
          for TASK_NAME in "${TASKS[@]}"; do
            # Create sub-issue title
            SUB_ISSUE_TITLE="[SUBTASK] ${EPIC_NAME} - Task ${SUB_ISSUE_COUNTER}: ${TASK_NAME}"
            
            # Create sub-issue body
            SUB_ISSUE_BODY="${ISSUE_BODY}

## Related to #${ISSUE_NUMBER}

### Task Details
- Subtask: ${TOTAL_TASKS:=4} of ${TOTAL_TASKS} → ${TASK_NAME}
- Parent Epic: #${ISSUE_NUMBER}
- Assigned: Not assigned
- Status: Not started"

            echo "Creating sub-issue: $SUB_ISSUE_TITLE"
            
            # Create sub-issue using GitHub API
            SUB_ISSUE_RESPONSE=$(curl -s -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/issues" \
              -d "{
                \"title\": \"${SUB_ISSUE_TITLE}\",
                \"body\": \"${SUB_ISSUE_BODY}\",
                \"labels\": [\"enhancement\", \"needs-review\"],
                \"assignees\": [],
                \"milestone\": null
              }")
            
            SUB_ISSUE_URL=$(echo "$SUB_ISSUE_RESPONSE" | jq -r '.html_url')
            SUB_ISSUE_NUMBER=$(echo "$SUB_ISSUE_RESPONSE" | jq -r '.number')
            SUB_ISSUE_STATE=$(echo "$SUB_ISSUE_RESPONSE" | jq -r '.state')
            
            echo "Created sub-issue: #${SUB_ISSUE_NUMBER} - State: ${SUB_ISSUE_STATE}"
            
            # Add reference to parent issue
            if [ "$SUB_ISSUE_STATE" == "open" ]; then
              curl -s -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/issues/${SUB_ISSUE_NUMBER}/labels" \
                -d "[\"needs-triage\"]"
              
              # Update sub-issue body to include full parent reference
              curl -s -X PATCH \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/issues/${SUB_ISSUE_NUMBER}" \
                -d "{\"body\": \"${SUB_ISSUE_BODY}\\n\\n## Parent Issue\\nRelated to Issue #${ISSUE_NUMBER}\\nStatus: Open\"}"
            fi
            
            # Build tracking string for first sub-issue only (for checklist)
            if [ -z "$FIRST_SUB_ISSUE_NUM" ]; then
              FIRST_SUB_ISSUE_NUM=${SUB_ISSUE_NUMBER}
            fi
            
            # Build tracking string
            if [ -z "$SUB_ISSUES" ]; then
              SUB_ISSUES="[#${SUB_ISSUE_NUMBER}](${SUB_ISSUE_URL})"
            else
              SUB_ISSUES="${SUB_ISSUES}, [#${SUB_ISSUE_NUMBER}](${SUB_ISSUE_URL})"
            fi
            
            SUB_ISSUE_COUNTER=$((SUB_ISSUE_COUNTER + 1))
          done
          
          echo "sub_issues=${SUB_ISSUES}" >> $GITHUB_OUTPUT
          echo "sub_issue_numbers=${SUB_ISSUES//\[/\[/}" >> $GITHUB_OUTPUT
          echo "first_sub_issue=${FIRST_SUB_ISSUE_NUM}" >> $GITHUB_OUTPUT
          echo "Created sub-issues: ${SUB_ISSUES}"

      - name: Update Parent Issue with Epic Tasks Checklist
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          echo "Updating parent issue #${ISSUE_NUMBER} with epic tasks checklist"
          
          # Fetch current issue
          ISSUE_DATA=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}")
          
          CURRENT_BODY=$(echo "$ISSUE_DATA" | jq -r '.body // "No body"')
          CURRENT_TITLE=$(echo "$ISSUE_DATA" | jq -r '.title')
          
          # Build task checklist
          TASK_CHECKLIST="- [ ] [Requirements Analysis](https://github.com/${OWNER}/${REPO}/issues/1) - Subtask 1 of 4\n"
          TASK_CHECKLIST+="- [ ] [Design and Architecture](https://github.com/${OWNER}/${REPO}/issues/2) - Subtask 2 of 4\n"
          TASK_CHECKLIST+="- [ ] [Implementation](https://github.com/${OWNER}/${REPO}/issues/3) - Subtask 3 of 4\n"
          TASK_CHECKLIST+="- [ ] [Testing and Documentation](https://github.com/${OWNER}/${REPO}/issues/4) - Subtask 4 of 4"
          
          # Add Epic Tasks section to body
          if [[ "${CURRENT_BODY}" != *"## Epic Tasks"* ]]; then
            NEW_BODY="${CURRENT_BODY}

## Epic Tasks

${TASK_CHECKLIST}"
            
            # Update issue body
            curl -s -X PATCH \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}" \
              -d "{
                \"body\": \"${NEW_BODY}\"
              }"
            
            echo "Parent issue body updated with Epic Tasks checklist"
          else
            echo "Epic Tasks section already exists, skipping"
          fi

  auto-response:
    name: Auto-Response for Issues
    runs-on: ubuntu-latest
    needs: issue-triage
    if: always() && github.event.issue.state == 'open'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check if first-time contributor (in this repo)
        id: check-contributor
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          USER: ${{ github.event.issue.user.login }}
        run: |
          echo "Checking if ${USER} is a first-time contributor to ${OWNER}/${REPO}"
          
          # Fetch issues created by this user
          ISSUES_DATA=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/issues?creator=${USER}&state=all&per_page=100")
          
          ISSUES_COUNT=$(echo "$ISSUES_DATA" | jq '.total_count // 0')
          
          echo "Issues created by ${USER}: ${ISSUES_COUNT}"
          
          if [ "$ISSUES_COUNT" -eq 0 ]; then
            echo "is_first_time_contributor=true" >> $GITHUB_OUTPUT
          else
            echo "is_first_time_contributor=false" >> $GITHUB_OUTPUT
          fi

      - name: Get Issue Labels
        id: get-labels
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ISSUE_DATA=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}")
          
          LABELS=$(echo "$ISSUE_DATA" | jq '[.labels[].name] | join(", ")')
          echo "Current labels: ${LABELS}"
          echo "labels=${LABELS}" >> $GITHUB_OUTPUT

      - name: Generate Auto-Response Comment
        id: generate-comment
        env:
          HAS_BUG: ${{ needs.issue-triage.outputs.has_bug }}
          HAS_EPIC: ${{ needs.issue-triage.outputs.has_epic }}
          HAS_MAINTENANCE: ${{ needs.issue-triage.outputs.has_maintenance }}
          IS_FIRST_TIME: ${{ steps.check-contributor.outputs.is_first_time_contributor }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          COMMENT_BODY=""
          
          # Welcome message for first-time contributors
          if [ "$IS_FIRST_TIME" == "true" ]; then
            COMMENT_BODY="### Welcome to ${{ github.event.repository.html_url }}! 👋"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="Thanks for creating your first issue in ${{ github.event.repository.html_url }}. We appreciate your contribution and will do our best to address it promptly."
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+=$'\n---\n\n'
          fi
          
          # Different responses based on issue type
          if [ "$HAS_BUG" == "1" ]; then
            COMMENT_BODY+="### 🐛 Bug Report Guidelines"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="Thank you for reporting this bug! To help us address it quickly, please ensure your bug report includes:"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="1. **Clear description** of the bug and expected behavior"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="2. **Steps to reproduce** the issue"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="3. **Expected vs Actual** results"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="4. **Environment information** (version, OS, etc.)"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="5. **Error messages** or screenshots"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="You can reference this issue using:\`${ISSUE_NUMBER}\`"
            COMMENT_BODY+=$'\n\n'
            
            # Change status label
            if echo "${{ steps.get-labels.outputs.labels }}" | grep -q "\\bneeds-triac\\b"; then
              curl -s -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}/labels" \
                -d '["needs-review"]'
              echo "Updated label from needs-triage to needs-review for bug issue"
            fi
            
          elif [ "$HAS_EPIC" == "1" ]; then
            COMMENT_BODY+="### ✨ Feature Request Process"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="Thank you for suggesting this epic! This large-scale feature has been registered and will be broken down into subtasks."
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="**Epic Overview:**"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="* **Issue #:** ${ISSUE_NUMBER}"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="* **Status:** Awaiting breakdown"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="* **Assignee:** Not assigned"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="**Next Steps:**"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="* This epic will be divided into 4 sub-tasks:"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="  1. Requirements Analysis"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="  2. Design and Architecture"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="  3. Implementation"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="  4. Testing and Documentation"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="Please stay tuned for updates as sub-issues are created. You can follow the progress using:\`${ISSUE_NUMBER}\`"
            COMMENT_BODY+=$'\n\n'
            
            # Change status label
            if echo "${{ steps.get-labels.outputs.labels }}" | grep -q "\\bneeds-triac\\b"; then
              curl -s -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}/labels" \
                -d '["needs-review"]'
              echo "Updated label from needs-triage to needs-review for epic issue"
            fi
            
          elif [ "$HAS_MAINTENANCE" == "1" ]; then
            COMMENT_BODY+="### 🧹 Maintenance Guidelines"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="Thank you for reporting this maintenance task. Our team will review and add it to our maintenance backlog."
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="**Maintenance Request:**"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="* **Issue #:** ${ISSUE_NUMBER}"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="* **Status:** Awaiting review"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="* **Priority:** Based on the current priority label"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="Please ensure your report includes relevant details about the maintenance work needed."
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="You can reference this issue using:\`${ISSUE_NUMBER}\`"
            COMMENT_BODY+=$'\n\n'
            
            # Change status label for maintenance issues as well
            if echo "${{ steps.get-labels.outputs.labels }}" | grep -q "\\bneeds-triac\\b"; then
              curl -s -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}/labels" \
                -d '["needs-review"]'
              echo "Updated label from needs-triage to needs-review for maintenance issue"
            fi
            
          else
            COMMENT_BODY+="### 📋 General Issue Response"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="Thank you for creating this issue. We've added appropriate labels for classification."
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="**Issue:** ${ISSUE_NUMBER}"
            COMMENT_BODY+=$'\n'
            COMMENT_BODY+="**Status:** Awaiting review"
            COMMENT_BODY+=$'\n\n'
            COMMENT_BODY+="Please provide any additional details that might help us address your issue."
            COMMENT_BODY+=$'\n\n'
            
            # Change status label for all non-epic issues
            if echo "${{ steps.get-labels.outputs.labels }}" | grep -q "\\bneeds-triac\\b"; then
              curl -s -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}/labels" \
                -d '["needs-review"]'
              echo "Updated label from needs-triage to needs-review for general issue"
            fi
          fi
          
          # Add first-time contributor label
          if [ "$IS_FIRST_TIME" == "true" ]; then
            curl -s -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}/labels" \
              -d '["first-time-contributor"]'
            echo "Added first-time-contributor label"
          fi
          
          # Escape newlines and special characters for the comment body
          COMMENT_BODY_ESCAPED=$(printf '%s' "$COMMENT_BODY" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          
          echo "Generated comment body"
          echo "$COMMENT_BODY" | head -20
          
          echo "comment_body=${COMMENT_BODY}" >> $GITHUB_OUTPUT

      - name: Post Auto-Response Comment
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          COMMENT_BODY="${{ steps.generate-comment.outputs.comment_body }}"
          COMMENT_BODY=$(printf '%s' "$COMMENT_BODY" | sed 's/\\/\\\\/g; s/"/\\"/g; s/`/\\`/g')
          
          curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "{\"body\": \"${COMMENT_BODY}\"}"
          
          echo "Auto-response comment posted to issue #${ISSUE_NUMBER}"

  set-milestone:
    name: Set Milestone for High Priority Issues
    runs-on: ubuntu-latest
    needs: [issue-triage, auto-response]
    if: |
      github.event.issue.state == 'open' && 
      needs.auto-response.outputs.status == 'success' &&
      (needs.issue-triage.outputs.priority == 'priority-critical' || needs.issue-triage.outputs.priority == 'priority-high')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Milestone to v1.0.0
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          echo "Setting milestone v1.0.0 for issue #${ISSUE_NUMBER}"
          
          # First, find the milestone number for v1.0.0
          MILESTONE_DATA=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/milestones?state=open&per_page=100")
          
          MILESTONE_NUMBER=$(echo "$MILESTONE_DATA" | jq -r '.[] | select(.title == "v1.0.0") | .number // empty')
          
          if [ -n "$MILESTONE_NUMBER" ]; then
            curl -s -X PATCH \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}" \
              -d "{
                \"milestone\": ${MILESTONE_NUMBER}
              }"
            echo "Milestone v1.0.0 (ID: ${MILESTONE_NUMBER}) added to issue #${ISSUE_NUMBER}"
          else
            echo "Milestone v1.0.0 not found, skipping milestone assignment"
          fi