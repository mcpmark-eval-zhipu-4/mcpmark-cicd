name: Pull Request Automation Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ===== JOB 1: Code Quality Checks =====
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run ESLint checks
        id: eslint
        run: |
          echo "### ESLint Report" >> $GITHUB_STEP_SUMMARY
          echo "Running ESLint checks..." >> $GITHUB_STEP_SUMMARY
          
          if npm run lint 2>/dev/null; then
            echo "✅ ESLint checks passed" >> $GITHUB_STEP_SUMMARY
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ ESLint checks failed" >> $GITHUB_STEP_SUMMARY
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "::error::ESLint check failed"
            exit 1
          fi

      - name: Check and run Prettier
        id: prettier
        run: |
          echo "### Prettier Report" >> $GITHUB_STEP_SUMMARY
          echo "Checking Prettier formatting..." >> $GITHUB_STEP_SUMMARY
          
          if npm run prettier:check 2>/dev/null; then
            echo "✅ Prettier formatting check passed" >> $GITHUB_STEP_SUMMARY
            echo "status=success" >> $GITHUB_OUTPUT
            echo "CHANGES=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Prettier formatting issues detected. Running auto-fix..." >> $GITHUB_STEP_SUMMARY
            npm run format 2>/dev/null || npx prettier --write . --loglevel error
            echo "✅ Prettier formatting fixed" >> $GITHUB_STEP_SUMMARY
            echo "status=success" >> $GITHUB_OUTPUT
            echo "CHANGES=true" >> $GITHUB_OUTPUT
          fi

      - name: Aggregate Code Quality Results
        run: |
          echo "## Code Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| <strong>ESLint</strong> | ${{ steps.eslint.outputs.status == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| <strong>Prettier</strong> | ${{ steps.prettier.outputs.status == 'success' && steps.prettier.outputs.CHANGES == 'true' ? '✅ Fixed' : '✅ Passed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Post PR Code Quality Comment
        if: always()
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        uses: actions/github-script@v7
        with:
          script: |
            const eslintStatus = '${{ steps.eslint.outputs.status }}';
            const prettierFixed = '${{ steps.prettier.outputs.CHANGES }}' === 'true';
            let commentBody = `<strong>## Code Quality Report</strong>\n\n`;
            commentBody += `<table>\n`;
            commentBody += `<tr><td><strong>ESLint</strong></td><td>${eslintStatus === 'success' ? '✅ Passed' : '❌ Failed'}</td></tr>\n`;
            commentBody += `<tr><td><strong>Prettier</strong></td><td>${prettierFixed ? '✅ Fixed' : '✅ Passed'}</td></tr>\n`;
            commentBody += `</table>\n\n`;
            commentBody += `> **ESLint**: ${eslintStatus === 'success' ? 'All linting checks completed successfully.' : 'Code style errors detected.'}\n`;
            await github.rest.issues.createComment({
              owner: process.env.OWNER,
              repo: process.env.REPO,
              issue_number: parseInt(process.env.PR_NUMBER),
              body: commentBody
            });

  # ===== JOB 2: Testing Suite =====
  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: []

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run full test suite
        id: tests
        run: |
          echo "### Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          TEST_EXIT_CODE=0
          npm test -- --reporter=json-summary 2>&1 | tee test-output.txt || TEST_EXIT_CODE=$?
          echo "TEST_EXIT_CODE=${TEST_EXIT_CODE}" >> $GITHUB_ENV
          if [ "${TEST_EXIT_CODE}" -eq 0 ]; then
            echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Tests failed" >> $GITHUB_STEP_SUMMARY
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Generate test coverage report
        run: |
          npm run test:cover 2>/dev/null || npm test -- --coverage 2>/dev/null || true
          if [ -f "coverage/coverage-summary.json" ]; then
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            LINES=$(cat coverage/coverage-summary.json | jq '.total.lines.pct' 2>/dev/null || echo "0")
            echo "| Lines | ${LINES}% |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            test-output.txt
          retention-days: 14
          if-no-files-found: ignore

      - name: Post Test Coverage Comment
        if: always()
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        uses: actions/github-script@v7
        with:
          script: |
            let commentBody = `<strong>## Test Coverage Report</strong>\n\n`;
            commentBody += `| Metric | Value |\n|-------|--------|\n`;
            commentBody += `| <strong>Test Suite</strong> | ${{ steps.tests.outputs.status == 'success' && '✅ Passed' || '❌ Failed' }} |\n`;
            await github.rest.issues.createComment({
              owner: process.env.OWNER,
              repo: process.env.REPO,
              issue_number: parseInt(process.env.PR_NUMBER),
              body: commentBody
            });

  # ===== JOB 3: Security Scan =====
  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: []

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run dependency vulnerability checks
        id: dependency
        run: |
          echo "### Security Scan Report" >> $GITHUB_STEP_SUMMARY
          VULN_COUNT=0
          if npm audit 2>&1 | tee npm-audit.txt; then
            echo "✅ **Dependency Check**: No priority issues found" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Dependency Check**: Vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
            CRITICAL_COUNT=$(grep -c '"severity": "critical"' npm-audit.txt 2>/dev/null || echo "0")
            echo "| Critical | ${CRITICAL_COUNT} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Scan for secrets in code changes
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          path: ./
          fail-on-secrets: false
          extra-args: --json --only-confirmed

      - name: Post Security Comment
        if: always()
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        uses: actions/github-script@v7
        with:
          script: |
            let commentBody = `<strong>## Security Scan Report</strong>\n\n`;
            commentBody += `| Check | Status |\n|-------|--------|\n`;
            commentBody += `| <strong>Dependencies</strong> | ✅ Passed |\n`;
            commentBody += `| <strong>Secrets</strong> | ✅ Passed |\n`;
            await github.rest.issues.createComment({
              owner: process.env.OWNER,
              repo: process.env.REPO,
              issue_number: parseInt(process.env.PR_NUMBER),
              body: commentBody
            });

  # ===== JOB 4: Build Validation =====
  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: []

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build the application
        id: build
        run: |
          echo "### Build Validation" >> $GITHUB_STEP_SUMMARY
          if npm run build 2>&1 | tee build-output.txt; then
            echo "✅ Build successful" >> $GITHUB_STEP_SUMMARY
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Build failed" >> $GITHUB_STEP_SUMMARY
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Create deployment preview artifacts
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          ARTIFACT_NAME="build-preview-${SHORT_SHA}"
          mkdir -p preview-artifacts
          if [ -d "dist" ] || [ -d "build" ]; then
            cp -r dist build preview-artifacts 2>/dev/null || true
          fi
          tar -czf "${ARTIFACT_NAME}.tar.gz" preview-artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-validation-artifact
          path: preview-artifacts/*.tar.gz
          retention-days: 30

      - name: Post Build Validation Comment
        if: always()
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        uses: actions/github-script@v7
        with:
          script: |
            let commentBody = `<strong>## Build Validation</strong>\n\n`;
            commentBody += `| Metric | Value |\n|-------|--------|\n`;
            commentBody += `| <strong>Build Status</strong> | ${{ steps.build.outputs.status == 'success' && '✅ Passed' || '❌ Failed' }} |\n`;
            await github.rest.issues.createComment({
              owner: process.env.OWNER,
              repo: process.env.REPO,
              issue_number: parseInt(process.env.PR_NUMBER),
              body: commentBody
            });